<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Aura Living</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #FFFDF7 0%, #FAF8F5 100%);
      color: #2C2C2C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      text-align: center;
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 700;
      color: #D4AF37;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(212,175,55,0.05) 100%);
      border: 2px dashed rgba(212,175,55,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 36px; height: 36px; color: #B8941F; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #2C2C2C;
    }
    p {
      font-size: 16px;
      color: #5A5A5A;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #D4AF37 0%, #C9A22E 50%, #B8941F 100%);
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #8A8A8A;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Aura Living</div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="10" y1="10" x2="14" y2="10"></line>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. Don't worry —
      your cart and wishlist are saved locally and will sync when you reconnect.
    </p>
    <a href="/" class="btn">Try Again</a>
    <div class="footer">
      Where Comfort Meets Style — auraliving.com
    </div>
  </div>
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
